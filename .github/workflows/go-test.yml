name: Go Tests

on:
  push:
    paths:
      - 'go/**'
  pull_request:
    paths:
      - 'go/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: go
        run: go build ./...

      - name: Test
        working-directory: go
        run: go test ./...
