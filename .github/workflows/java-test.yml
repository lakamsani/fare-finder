name: Java Tests

on:
  push:
    branches: ["migrate/go-to-java"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download dependencies
        run: |
          mkdir -p /opt/gradle-8.13/lib
          curl -fsSL https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10/gson-2.10.jar \
            -o /opt/gradle-8.13/lib/gson-2.10.jar
          curl -fsSL https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar \
            -o /opt/gradle-8.13/lib/junit-4.13.2.jar
          curl -fsSL https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar \
            -o /opt/gradle-8.13/lib/hamcrest-core-1.3.jar

      - name: Build
        run: gradle compileJava

      - name: Test
        run: gradle test --info
